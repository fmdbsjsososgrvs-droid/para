<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다솜이네</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="apple-touch-icon-precomposed" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/guard.js"></script>
  <style>
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 30px;
      align-items: center;
      padding: 30px 10px 10px;
    }
    .hero-text h2 {
      font-family: 'Gaegu', 'Apple SD Gothic Neo', '돋움', sans-serif;
      font-size: 42px;
      color: var(--accent-deep);
      margin: 0 0 14px;
      line-height: 1.2;
    }
    .hero-text p {
      font-size: 17px;
      color: #6b4a55;
      line-height: 1.7;
      margin: 0 0 12px;
    }
    .hero-img {
      text-align: center;
      position: relative;
    }
    .hero-img img.main {
      width: 240px;
      animation: bob 3s ease-in-out infinite;
      filter: drop-shadow(4px 6px 8px rgba(217, 106, 138, 0.25));
    }
    .hero-img img.side {
      position: absolute;
      width: 110px;
      bottom: 0;
      right: 10%;
      animation: bob 3s ease-in-out infinite 0.5s;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(0); }
      50%      { transform: translateY(-12px) rotate(-3deg); }
    }
    @media (max-width: 720px) {
      .hero { grid-template-columns: 1fr; text-align: center; }
      .hero-text h2 { font-size: 32px; }
      .hero-img img.main { width: 180px; }
      .hero-img img.side { width: 80px; right: 20%; }
    }
  </style>
</head>
<body class="theme-home">

  <header class="app-header">
    <div class="brand">
      <img src="11/dasom.png" alt="" />
      <span>다솜이네</span>
    </div>
    <button id="logout" class="logout-btn">나가기</button>
  </header>

  <nav class="main-nav">
    <a href="home.html" class="nav-link active">다솜이네</a>
    <a href="calendar.html" class="nav-link">달력</a>
    <a href="todo.html" class="nav-link">해야 할일</a>
    <a href="memo.html" class="nav-link">메모장</a>
  </nav>

  <main class="page">
    <section class="card">
      <div class="hero">
        <div class="hero-text">
          <h2>우리 가족의<br/>따뜻한 공간 ♥</h2>
          <p>오늘도 사랑이 가득한 하루,<br/>다솜이네에 오신 걸 환영해요.</p>
          <p style="color:#a78ba0; font-size:14px;">위에서 달력 · 해야 할일 · 메모장으로 이동할 수 있어요.</p>
        </div>
        <div class="hero-img">
          <img class="main" src="11/happy.png" alt="다솜이" />
          <img class="side" src="11/11.png" alt="강아지" />
        </div>
      </div>
    </section>
  </main>

  <footer class="app-footer">made with ♥ for 다솜이네 가족</footer>
</body>
</html>
