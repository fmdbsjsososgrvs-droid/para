<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>해야 할일 — 다솜이네</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/guard.js"></script>
  <style>
    .add-row {
      display: flex;
      gap: 10px;
      margin-bottom: 22px;
    }
    .add-row input {
      flex: 1;
      padding: 12px 18px;
      border: 2px solid var(--accent-soft);
      border-radius: 999px;
      background: var(--paper);
      font-family: inherit;
      font-size: 15px;
      color: #5a4651;
      outline: none;
      transition: all .15s;
    }
    .add-row input:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .add-row button {
      padding: 0 24px;
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: 'Gaegu', cursive;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .add-row button:hover { background: var(--accent-deep); }

    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      min-height: 80px;
    }
    .todo-list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.55);
      border: 2px solid transparent;
      border-radius: 16px;
      margin-bottom: 8px;
      transition: all .15s;
    }
    .todo-list li:hover {
      border-color: var(--accent-soft);
      background: #fff;
    }
    .todo-list .check {
      width: 22px;
      height: 22px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .todo-list .text {
      flex: 1;
      color: #5a4651;
      font-size: 15px;
    }
  </style>
</head>
<body class="theme-todo">

  <header class="app-header">
    <div class="brand">
      <img src="11/dasom.png" alt="" />
      <span>다솜이네</span>
    </div>
    <button id="logout" class="logout-btn">나가기</button>
  </header>

  <nav class="main-nav">
    <a href="home.html" class="nav-link">다솜이네</a>
    <a href="calendar.html" class="nav-link">달력</a>
    <a href="todo.html" class="nav-link active">해야 할일</a>
    <a href="memo.html" class="nav-link">메모장</a>
  </nav>

  <main class="page">
    <section class="card">
      <h1 class="page-title">✓ 해야 할일</h1>
      <p class="page-subtitle">함께 챙길 가족의 일들이에요.</p>

      <div class="add-row">
        <input type="text" placeholder="할 일을 적어주세요" disabled />
        <button type="button" disabled>추가</button>
      </div>

      <ul class="todo-list" id="todoList">
        <!-- 비어있음: empty state로 대체 -->
      </ul>

      <div class="empty-state">
        <img src="11/22.png" alt="" />
        <div class="msg">아직 할 일이 없어요</div>
        <div class="sub">곧 가족 할 일을 추가할 수 있게 될 거예요.</div>
      </div>
    </section>
  </main>

  <footer class="app-footer">made with ♥ for 다솜이네 가족</footer>
</body>
</html>
