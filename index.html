<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>다솜이네 가족</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Gowun Dodum', 'Gaegu', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, #ffe2ec 0%, transparent 40%),
        radial-gradient(circle at 85% 15%, #fff4d6 0%, transparent 45%),
        radial-gradient(circle at 50% 90%, #e3f0ff 0%, transparent 50%),
        linear-gradient(135deg, #fff7fb 0%, #fef6e4 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 떠다니는 하트 */
    .heart {
      position: absolute;
      color: #ffb6c1;
      opacity: 0.6;
      animation: floatHeart 8s ease-in infinite;
      font-size: 24px;
      pointer-events: none;
    }
    .heart:nth-child(1) { left: 10%; animation-delay: 0s; }
    .heart:nth-child(2) { left: 25%; animation-delay: 2s; font-size: 18px; color: #ffd5e5;}
    .heart:nth-child(3) { left: 50%; animation-delay: 4s; font-size: 28px; color: #ffc0cb;}
    .heart:nth-child(4) { left: 70%; animation-delay: 1s; font-size: 20px; color: #ffe0ec;}
    .heart:nth-child(5) { left: 85%; animation-delay: 3s; font-size: 22px; color: #ffb6c1;}
    .heart:nth-child(6) { left: 35%; animation-delay: 5s; font-size: 26px; color: #ffcad4;}

    @keyframes floatHeart {
      0%   { bottom: -40px; transform: translateX(0) rotate(0deg); opacity: 0;}
      10%  { opacity: 0.7;}
      50%  { transform: translateX(20px) rotate(15deg);}
      90%  { opacity: 0.5;}
      100% { bottom: 110%; transform: translateX(-20px) rotate(-10deg); opacity: 0;}
    }

    .gate {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      border: 3px solid #ffe0ec;
      border-radius: 32px;
      padding: 50px 60px 45px;
      box-shadow: 0 20px 60px rgba(255, 182, 193, 0.35);
      text-align: center;
      max-width: 420px;
      width: 90%;
      position: relative;
      z-index: 2;
    }

    .gate::before {
      content: '';
      position: absolute;
      top: -50px;
      right: -30px;
      width: 110px;
      height: 110px;
      background: url('11/dasom.png') no-repeat center/contain;
      transform: rotate(15deg);
    }

    .gate::after {
      content: '';
      position: absolute;
      bottom: -40px;
      left: -40px;
      width: 100px;
      height: 100px;
      background: url('11/21.png') no-repeat center/contain;
      transform: rotate(-12deg);
    }

    .title {
      font-family: 'Gaegu', cursive;
      font-size: 38px;
      font-weight: 700;
      color: #d96a8a;
      margin: 0 0 8px;
      letter-spacing: 2px;
      text-shadow: 2px 2px 0 #fff5f8;
    }

    .subtitle {
      font-size: 14px;
      color: #b88da0;
      margin-bottom: 30px;
    }

    .character-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .character-row img {
      width: 70px;
      height: 70px;
      object-fit: contain;
      animation: bounce 2.4s ease-in-out infinite;
    }
    .character-row img:nth-child(2) { animation-delay: 0.3s; width: 80px; height: 80px;}
    .character-row img:nth-child(3) { animation-delay: 0.6s;}

    @keyframes bounce {
      0%, 100% { transform: translateY(0);}
      50%      { transform: translateY(-10px);}
    }

    .pw-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .pw-input {
      padding: 14px 20px;
      border: 2px solid #ffd1dc;
      border-radius: 999px;
      background: #fff9fb;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 16px;
      color: #6b4a55;
      text-align: center;
      letter-spacing: 4px;
      outline: none;
      transition: all .2s;
    }
    .pw-input:focus {
      border-color: #ff9bb5;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255, 182, 193, 0.25);
    }

    .pw-btn {
      padding: 13px 24px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(135deg, #ffb6c1 0%, #ffc8a2 100%);
      color: #fff;
      font-family: 'Gaegu', cursive;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 4px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(255, 150, 170, 0.45);
      transition: all .2s;
    }
    .pw-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 9px 22px rgba(255, 150, 170, 0.55);
    }
    .pw-btn:active { transform: translateY(0); }

    .err {
      min-height: 20px;
      color: #e06b86;
      font-size: 14px;
      margin-top: 4px;
      animation: shake 0.4s;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0);}
      25%      { transform: translateX(-6px);}
      75%      { transform: translateX(6px);}
    }

    .footer-note {
      margin-top: 22px;
      font-size: 12px;
      color: #c2a3b0;
    }

    @media (max-width: 480px) {
      .gate { padding: 40px 28px 35px; }
      .title { font-size: 30px; }
      .gate::before { width: 80px; height: 80px; top: -35px; right: -10px;}
      .gate::after { width: 75px; height: 75px; bottom: -25px; left: -15px;}
    }
  </style>
</head>
<body>
  <!-- 떠다니는 하트 -->
  <span class="heart">♥</span>
  <span class="heart">♡</span>
  <span class="heart">♥</span>
  <span class="heart">♡</span>
  <span class="heart">♥</span>
  <span class="heart">♡</span>

  <main class="gate">
    <h1 class="title">다솜이네 가족</h1>
    <p class="subtitle">우리 가족만의 따뜻한 공간이에요</p>

    <div class="character-row">
      <img src="11/a8.jpg" alt="" />
      <img src="11/happy.png" alt="" />
      <img src="11/11.png" alt="" />
    </div>

    <form class="pw-form" id="pwForm" autocomplete="off">
      <input
        type="password"
        id="pw"
        class="pw-input"
        placeholder="비밀번호"
        maxlength="32"
        required
      />
      <button type="submit" class="pw-btn">들어가기</button>
      <div class="err" id="err">&nbsp;</div>
    </form>

    <p class="footer-note">사랑하는 가족만 들어올 수 있어요 ♥</p>
  </main>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
