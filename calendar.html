<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>달력 — 다솜이네</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gaegu:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <script src="js/guard.js"></script>
  <style>
    /* ─── 카테고리 파스텔 색상 (CSS 변수) ─── */
    :root {
      --cat-all:   #c8b6e2;   /* 전체 — 보라 */
      --cat-all-s: #ece4f7;
      --cat-mom:   #f7a8a8;   /* 엄마 — 빨강 */
      --cat-mom-s: #fcd5d5;
      --cat-dad:   #a8c8ec;   /* 아빠 — 파랑 */
      --cat-dad-s: #d6e4f6;
      --cat-da:    #f7d976;   /* 다솜 — 노랑 */
      --cat-da-s:  #fcecb3;
    }

    .cal-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cal-month {
      font-family: 'Gaegu', 'Apple SD Gothic Neo', '돋움', sans-serif;
      font-size: 30px;
      color: var(--accent-deep);
    }
    .cal-nav { display: flex; gap: 8px; }
    .cal-nav button {
      background: var(--accent-soft);
      border: none;
      color: var(--accent-deep);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      font-weight: 700;
      transition: all .15s;
    }
    .cal-nav button:hover { background: var(--accent); color: #fff; }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }
    .cal-grid .dow {
      text-align: center;
      padding: 8px 0;
      font-family: 'Gaegu', 'Apple SD Gothic Neo', '돋움', sans-serif;
      font-size: 16px;
      color: var(--accent-deep);
    }
    .cal-grid .dow.sun { color: #e07b94; }
    .cal-grid .dow.sat { color: #6aa3c9; }

    .cal-cell {
      aspect-ratio: 1 / 1;
      background: rgba(255, 255, 255, 0.55);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 8px;
      font-size: 14px;
      color: #6b4a55;
      transition: all .15s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .cal-cell.empty { background: transparent; cursor: default; }
    .cal-cell:hover:not(.empty) {
      border-color: var(--accent);
      background: #fff;
      transform: translateY(-1px);
    }
    .cal-cell.today {
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }
    .cal-cell .day-num { font-weight: 700; }

    /* 이벤트 미리보기 (각 셀 안) */
    .ev-mini {
      margin-top: 4px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }
    .ev-chip {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.35;
      padding: 3px 8px;
      border-radius: 7px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #111;
      letter-spacing: -0.2px;
    }
    .ev-chip.cat-all { background: var(--cat-all-s); border-left: 4px solid var(--cat-all); }
    .ev-chip.cat-mom { background: var(--cat-mom-s); border-left: 4px solid var(--cat-mom); }
    .ev-chip.cat-dad { background: var(--cat-dad-s); border-left: 4px solid var(--cat-dad); }
    .ev-chip.cat-da  { background: var(--cat-da-s);  border-left: 4px solid var(--cat-da); }
    .ev-more {
      font-size: 12px;
      font-weight: 700;
      color: #222;
      padding: 0 4px;
    }
    /* 오늘 셀 안에서도 칩이 또렷하게 보이도록 */
    .cal-cell.today .ev-chip { color: #111; }
    .cal-cell.today .ev-more { color: #fff; }

    /* ─── 모달 ─── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(80, 60, 70, 0.35);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      animation: fadeIn .2s ease-out;
    }
    .modal-bg.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0;} to { opacity: 1;} }

    .modal {
      background: #fff;
      border-radius: 24px;
      width: min(480px, 92%);
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 30px 26px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      border: 3px solid var(--accent-soft);
      animation: pop .25s cubic-bezier(.5,1.6,.5,1);
    }
    @keyframes pop {
      from { transform: scale(.85); opacity: 0;}
      to   { transform: scale(1);   opacity: 1;}
    }
    .modal h2 {
      font-family: 'Gaegu', 'Apple SD Gothic Neo', '돋움', sans-serif;
      color: var(--accent-deep);
      margin: 0 0 4px;
      font-size: 26px;
    }
    .modal .muted {
      font-size: 13px;
      color: #8a6f7a;
      margin: 0 0 18px;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent-deep);
      margin-bottom: 6px;
    }
    .field input[type="date"],
    .field input[type="time"],
    .field textarea {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--accent-soft);
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      color: #5a4651;
      background: var(--paper);
      outline: none;
      transition: all .15s;
    }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      background: #fff;
    }
    .field textarea {
      resize: vertical;
      min-height: 90px;
    }

    /* 카테고리 라디오 */
    .cat-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .cat-row label {
      flex: 1 1 calc(50% - 8px);
      min-width: 110px;
      padding: 9px 12px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      border: 2px solid transparent;
      transition: all .15s;
      user-select: none;
      font-weight: 700;
      color: #4a3a44;
    }
    .cat-row label.cat-all { background: var(--cat-all-s); }
    .cat-row label.cat-mom { background: var(--cat-mom-s); }
    .cat-row label.cat-dad { background: var(--cat-dad-s); }
    .cat-row label.cat-da  { background: var(--cat-da-s); }
    .cat-row input { display: none; }
    .cat-row input:checked + span { font-weight: 700; }
    .cat-row label:has(input:checked).cat-all { border-color: var(--cat-all); background: #fff; }
    .cat-row label:has(input:checked).cat-mom { border-color: var(--cat-mom); background: #fff; }
    .cat-row label:has(input:checked).cat-dad { border-color: var(--cat-dad); background: #fff; }
    .cat-row label:has(input:checked).cat-da  { border-color: var(--cat-da);  background: #fff; }

    /* 이모티콘 툴바 */
    .emoji-bar {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .emoji-bar button {
      width: 36px;
      height: 36px;
      border: 2px solid var(--accent-soft);
      background: var(--paper);
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      transition: all .15s;
    }
    .emoji-bar button:hover {
      transform: translateY(-2px);
      background: #fff;
      border-color: var(--accent);
    }

    /* 모달 액션 */
    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      padding: 10px 22px;
      border: none;
      border-radius: 999px;
      font-family: 'Gaegu', 'Apple SD Gothic Neo', '돋움', sans-serif;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all .15s;
    }
    .btn.primary { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-deep); }
    .btn.ghost { background: transparent; color: #8a6f7a; }
    .btn.ghost:hover { background: var(--accent-soft); color: var(--accent-deep); }
    .btn.danger { background: transparent; color: #c97070; border: 2px solid #f0c4c4; }
    .btn.danger:hover { background: #fbe5e5; }

    /* 기존 이벤트 목록 (모달 내) */
    .ev-list {
      list-style: none;
      padding: 0;
      margin: 0 0 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 180px;
      overflow-y: auto;
    }
    .ev-list li {
      padding: 10px 14px;
      border-radius: 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      background: #fafafa;
      border-left: 5px solid var(--accent-soft);
    }
    .ev-list li.cat-all { border-left-color: var(--cat-all); background: var(--cat-all-s); }
    .ev-list li.cat-mom { border-left-color: var(--cat-mom); background: var(--cat-mom-s); }
    .ev-list li.cat-dad { border-left-color: var(--cat-dad); background: var(--cat-dad-s); }
    .ev-list li.cat-da  { border-left-color: var(--cat-da);  background: var(--cat-da-s); }
    .ev-list .ev-time {
      font-size: 12px;
      color: #6b4a55;
      font-weight: 700;
      min-width: 48px;
    }
    .ev-list .ev-text {
      flex: 1;
      font-size: 14px;
      color: #4a3a44;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .ev-list .ev-edit,
    .ev-list .ev-del {
      background: transparent;
      border: none;
      color: #a48b96;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: all .15s;
    }
    .ev-list .ev-edit:hover { color: var(--accent-deep); background: rgba(255,255,255,0.6); }
    .ev-list .ev-del:hover  { color: #c97070; background: rgba(255,255,255,0.6); }

    /* 수정 중인 항목 강조 */
    .ev-list li.editing {
      outline: 2px dashed var(--accent-deep);
      outline-offset: -2px;
      background: #fff !important;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      font-size: 13px;
      color: #6b4a55;
    }
    .legend .dot {
      display: inline-block;
      width: 12px; height: 12px;
      border-radius: 50%;
      margin-right: 4px;
      vertical-align: middle;
    }
  </style>
</head>
<body class="theme-calendar">

  <header class="app-header">
    <div class="brand">
      <img src="11/dasom.png" alt="" />
      <span>다솜이네</span>
    </div>
    <button id="logout" class="logout-btn">나가기</button>
  </header>

  <nav class="main-nav">
    <a href="home.html" class="nav-link">다솜이네</a>
    <a href="calendar.html" class="nav-link active">달력</a>
    <a href="todo.html" class="nav-link">해야 할일</a>
    <a href="memo.html" class="nav-link">메모장</a>
  </nav>

  <main class="page">
    <section class="card">
      <h1 class="page-title">📅 가족 달력</h1>

      <div class="legend">
        <span><i class="dot" style="background:var(--cat-all)"></i>전체</span>
        <span><i class="dot" style="background:var(--cat-mom)"></i>엄마</span>
        <span><i class="dot" style="background:var(--cat-dad)"></i>아빠</span>
        <span><i class="dot" style="background:var(--cat-da)"></i>다솜</span>
      </div>

      <div class="cal-toolbar">
        <div class="cal-month" id="calMonth">2026년 4월</div>
        <div class="cal-nav">
          <button id="prevMonth" aria-label="이전">‹</button>
          <button id="nextMonth" aria-label="다음">›</button>
        </div>
      </div>

      <div class="cal-grid" id="calGrid">
        <div class="dow sun">일</div>
        <div class="dow">월</div>

  </main>

  <!-- ─── 일정 입력 모달 ─── -->
  <div class="modal-bg" id="modalBg" aria-hidden="true">
    <div class="modal" role="dialog" aria-labelledby="modalTitle">
      <h2 id="modalTitle">일정</h2>
      <p class="muted" id="modalDateLabel"></p>

      <ul class="ev-list" id="evList"></ul>

      <form id="evForm" autocomplete="off">
        <div class="field">
          <label for="fDate">날짜</label>
          <input type="date" id="fDate" required />
        </div>
        <div class="field">
          <label for="fTime">시간</label>
          <input type="time" id="fTime" />
        </div>
        <div class="field">
          <label>카테고리</label>
          <div class="cat-row">
            <label class="cat-all">
              <input type="radio" name="cat" value="all" checked />
              <span>전체</span>
            </label>
            <label class="cat-mom">
              <input type="radio" name="cat" value="mom" />
              <span>엄마</span>
            </label>
            <label class="cat-dad">
              <input type="radio" name="cat" value="dad" />
              <span>아빠</span>
            </label>
            <label class="cat-da">
              <input type="radio" name="cat" value="da" />
              <span>다솜</span>
            </label>
          </div>
        </div>
        <div class="field">
          <label for="fContent">내용</label>
          <div class="emoji-bar" id="emojiBar">
            <button type="button" data-emoji="⭐">⭐</button>
            <button type="button" data-emoji="❤️">❤️</button>
            <button type="button" data-emoji="🐩">🐩</button>
            <button type="button" data-emoji="🐦">🐦</button>
            <button type="button" data-emoji="🦉">🦉</button>
          </div>
          <textarea id="fContent" placeholder="일정 내용을 적어주세요" required></textarea>
        </div>

        <div class="actions">
          <button type="button" class="btn ghost" id="btnClose">닫기</button>
          <button type="button" class="btn danger" id="btnCancelEdit" hidden>수정 취소</button>
          <button type="submit" class="btn primary" id="btnSubmit">저장</button>
        </div>
      </form>
    </div>
  </div>

  <footer class="app-footer">made with ♥ for 다솜이네 가족</footer>

  <script type="module">
  /* ───────────────────────────────────────────
   * 다솜이네 — 달력 (Firestore 연동)
   * dasom_events 컬렉션에 실시간 동기화됩니다.
   * ─────────────────────────────────────────── */
  import {
    db, COLS,
    collection, doc,
    addDoc, updateDoc, deleteDoc,
    onSnapshot, serverTimestamp,
    ensureSignedIn,
  } from './js/firebase-init.js';

  // Firestore 호출 전 익명 인증 보장 (보안 규칙: request.auth != null)
  try {
    await ensureSignedIn();
  } catch (e) {
    console.error('Firebase 인증 실패', e);
    alert('인증이 만료됐어요. 다시 로그인해 주세요.');
    sessionStorage.removeItem('dasom_family_auth');
    location.replace('index.html');
    throw e;
  }

  (function () {
    'use strict';

    // ─── 카테고리 메타 ───
    const CATS = {
      all: { key: 'all', label: '전체', cls: 'cat-all' },
      mom: { key: 'mom', label: '엄마', cls: 'cat-mom' },
      dad: { key: 'dad', label: '아빠', cls: 'cat-dad' },
      da:  { key: 'da',  label: '다솜', cls: 'cat-da'  },
    };

    // ─── 데이터 저장소 (Firestore) ───
    // 로컬 캐시: { 'YYYY-MM-DD' → [{ id, date, time, cat, content }] }
    // onSnapshot 으로 실시간 동기화. UI는 캐시를 동기적으로 읽고,
    // add/update/remove 는 Firestore 비동기 호출 → 곧이어 onSnapshot 이 캐시를 갱신.
    const eventsRef = collection(db, COLS.events);

    const EventStore = {
      cache: {},
      ready: false,
      list(date) {
        return (this.cache[date] || []).slice()
          .sort((a, b) => (a.time || '').localeCompare(b.time || ''));
      },
      get(date, id) { return (this.cache[date] || []).find(e => e.id === id) || null; },
      async add(date, ev) {
        return addDoc(eventsRef, {
          date,
          time: ev.time || '',
          cat: ev.cat,
          content: ev.content,
          createdAt: serverTimestamp(),
        });
      },
      async update(date, id, patch) {
        return updateDoc(doc(db, COLS.events, id), patch);
      },
      async remove(date, id) {
        return deleteDoc(doc(db, COLS.events, id));
      },
    };

    // 실시간 구독 — 컬렉션 전체를 받아 날짜별로 캐시
    onSnapshot(eventsRef, (snap) => {
      const next = {};
      snap.forEach(d => {
        const data = d.data();
        if (!data || !data.date) return;
        if (!next[data.date]) next[data.date] = [];
        next[data.date].push({ id: d.id, ...data });
      });
      EventStore.cache = next;
      EventStore.ready = true;
      renderCalendar();
      if (modalDate) {
        // 다른 디바이스에서 수정 중인 항목이 삭제됐으면 수정 모드 해제
        if (editingId && !EventStore.get(editingDate, editingId)) {
          exitEditMode();
        }
        renderEvList();
      }
    }, (err) => {
      console.error('[Firestore] onSnapshot error', err);
    });

    // ─── 달력 ───
    const monthEl = document.getElementById('calMonth');
    const grid = document.getElementById('calGrid');
    let cur = new Date();
    cur.setDate(1);

    function pad(n) { return String(n).padStart(2, '0'); }
    function dateKey(y, m, d) { return `${y}-${pad(m+1)}-${pad(d)}`; }

    function renderCalendar() {
      while (grid.children.length > 7) grid.removeChild(grid.lastChild);

      const y = cur.getFullYear();
      const m = cur.getMonth();
      monthEl.textContent = `${y}년 ${m + 1}월`;

      const first = new Date(y, m, 1).getDay();
      const last = new Date(y, m + 1, 0).getDate();
      const today = new Date();

      for (let i = 0; i < first; i++) {
        const d = document.createElement('div');
        d.className = 'cal-cell empty';
        grid.appendChild(d);
      }
      for (let day = 1; day <= last; day++) {
        const key = dateKey(y, m, day);
        const cell = document.createElement('div');
        cell.className = 'cal-cell';
        cell.dataset.date = key;
        if (today.getFullYear() === y && today.getMonth() === m && today.getDate() === day) {
          cell.classList.add('today');
        }

        const num = document.createElement('div');
        num.className = 'day-num';
        num.textContent = day;
        cell.appendChild(num);

        // 미리보기: 최대 2개 + 더보기
        const evs = EventStore.list(key);
        if (evs.length) {
          const wrap = document.createElement('div');
          wrap.className = 'ev-mini';
          evs.slice(0, 2).forEach(e => {
            const chip = document.createElement('div');
            chip.className = 'ev-chip ' + CATS[e.cat].cls;
            chip.textContent = (e.time ? e.time + ' ' : '') + e.content;
            wrap.appendChild(chip);
          });
          if (evs.length > 2) {
            const more = document.createElement('div');
            more.className = 'ev-more';
            more.textContent = `+ ${evs.length - 2}개 더`;
            wrap.appendChild(more);
          }
          cell.appendChild(wrap);
        }

        cell.addEventListener('click', () => openModal(key));
        grid.appendChild(cell);
      }
    }

    document.getElementById('prevMonth').onclick = () => {
      cur.setMonth(cur.getMonth() - 1); renderCalendar();
    };
    document.getElementById('nextMonth').onclick = () => {
      cur.setMonth(cur.getMonth() + 1); renderCalendar();
    };

    // ─── 모달 ───
    const modalBg = document.getElementById('modalBg');
    const modalDateLabel = document.getElementById('modalDateLabel');
    const evForm = document.getElementById('evForm');
    const fDate = document.getElementById('fDate');
    const fTime = document.getElementById('fTime');
    const fContent = document.getElementById('fContent');
    const evList = document.getElementById('evList');
    const btnSubmit = document.getElementById('btnSubmit');
    const btnCancelEdit = document.getElementById('btnCancelEdit');
    let modalDate = null;
    let editingId = null;     // 수정 중인 일정 id (없으면 신규 입력 모드)
    let editingDate = null;   // 수정 시작 시점의 원래 날짜

    function openModal(key) {
      modalDate = key;
      const [y, m, d] = key.split('-').map(Number);
      const date = new Date(y, m - 1, d);
      const wk = ['일','월','화','수','목','금','토'][date.getDay()];
      modalDateLabel.textContent = `${y}년 ${m}월 ${d}일 (${wk})`;

      // 신규 입력 모드로 초기화
      exitEditMode();

      renderEvList();
      modalBg.classList.add('open');
      modalBg.setAttribute('aria-hidden', 'false');

      // 모달 내부 스크롤을 최상단으로
      const modalEl = modalBg.querySelector('.modal');
      if (modalEl) modalEl.scrollTop = 0;

      // 포커스는 주되 스크롤은 옮기지 않음 (textarea가 화면 밖이어도 스크롤 그대로 유지)
      setTimeout(() => {
        try { fContent.focus({ preventScroll: true }); }
        catch (e) { fContent.focus(); }
      }, 100);
    }
    function closeModal() {
      modalBg.classList.remove('open');
      modalBg.setAttribute('aria-hidden', 'true');
      modalDate = null;
      editingId = null;
      editingDate = null;
    }

    // ─── 수정 모드 진입 / 종료 ───
    function enterEditMode(ev) {
      editingId = ev.id;
      editingDate = modalDate;
      fDate.value = modalDate;
      fTime.value = ev.time || '';
      fContent.value = ev.content || '';
      const radio = evForm.querySelector(`input[name="cat"][value="${ev.cat}"]`);
      if (radio) radio.checked = true;
      btnSubmit.textContent = '수정 완료';
      btnCancelEdit.hidden = false;
      renderEvList();
      // 폼 영역으로 스크롤 + 포커스
      fContent.focus();
    }
    function exitEditMode() {
      editingId = null;
      editingDate = null;
      fDate.value = modalDate;
      fTime.value = '';
      fContent.value = '';
      const allRadio = evForm.querySelector('input[name="cat"][value="all"]');
      if (allRadio) allRadio.checked = true;
      btnSubmit.textContent = '저장';
      btnCancelEdit.hidden = true;
    }
    btnCancelEdit.addEventListener('click', () => {
      exitEditMode();
      renderEvList();
    });

    function renderEvList() {
      evList.innerHTML = '';
      const evs = EventStore.list(modalDate);
      if (!evs.length) {
        evList.innerHTML = '<li style="background:transparent;border-left:none;color:#a48b96;font-size:13px;justify-content:center;">아직 등록된 일정이 없어요</li>';
        return;
      }
      evs.forEach(e => {
        const li = document.createElement('li');
        li.className = CATS[e.cat].cls;
        if (editingId === e.id) li.classList.add('editing');
        li.innerHTML = `
          <span class="ev-time">${e.time || '종일'}</span>
          <span class="ev-text">[${CATS[e.cat].label}] ${escapeHtml(e.content)}</span>
          <button type="button" class="ev-edit" title="수정">✎</button>
          <button type="button" class="ev-del"  title="삭제">✕</button>
        `;
        li.querySelector('.ev-edit').onclick = () => enterEditMode(e);
        li.querySelector('.ev-del').onclick = async () => {
          // 수정 중인 항목을 삭제하면 수정 모드도 빠져나옴
          if (editingId === e.id) exitEditMode();
          try {
            await EventStore.remove(modalDate, e.id);
            // onSnapshot 이 곧 renderCalendar / renderEvList 호출
          } catch (err) {
            console.error(err);
            alert('삭제에 실패했어요: ' + err.message);
          }
        };
        evList.appendChild(li);
      });
    }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c => ({
        '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
      }[c]));
    }

    // 모달 닫기 동작
    document.getElementById('btnClose').onclick = closeModal;
    modalBg.addEventListener('click', (e) => {
      if (e.target === modalBg) closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && modalBg.classList.contains('open')) closeModal();
    });

    // 이모티콘 삽입
    document.getElementById('emojiBar').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-emoji]');
      if (!btn) return;
      const em = btn.dataset.emoji;
      const start = fContent.selectionStart || fContent.value.length;
      const end = fContent.selectionEnd || fContent.value.length;
      const v = fContent.value;
      fContent.value = v.slice(0, start) + em + v.slice(end);
      const pos = start + em.length;
      fContent.setSelectionRange(pos, pos);
      fContent.focus();
    });

    // 저장 (신규) / 수정 완료 분기 — Firestore 비동기 호출
    evForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const date = fDate.value;
      const time = fTime.value;
      const cat = evForm.querySelector('input[name="cat"]:checked').value;
      const content = fContent.value.trim();
      if (!date || !content) return;

      btnSubmit.disabled = true;
      const wasEditing = !!editingId;
      try {
        if (editingId) {
          // 수정 모드 — 날짜가 바뀌었으면 그쪽 날짜로 이동시키고, 같으면 제자리 업데이트
          if (date !== editingDate) {
            await EventStore.remove(editingDate, editingId);
            await EventStore.add(date, { time, cat, content });
          } else {
            await EventStore.update(date, editingId, { time, cat, content });
          }
        } else {
          await EventStore.add(date, { time, cat, content });
        }

        // 모달 컨텍스트를 저장된 날짜로 이동
        if (date !== modalDate) {
          modalDate = date;
          const [y, m, d] = date.split('-').map(Number);
          const wk = ['일','월','화','수','목','금','토'][new Date(y, m - 1, d).getDay()];
          modalDateLabel.textContent = `${y}년 ${m}월 ${d}일 (${wk})`;
        }

        if (wasEditing) {
          exitEditMode();
        } else {
          // 신규 — 카테고리는 유지하고 시간/내용만 비움
          fTime.value = '';
          fContent.value = '';
        }
        // 화면 갱신은 onSnapshot 이 받아서 처리, 즉시 보여주려면 한 번 더 그려줘도 됨
        renderEvList();
        fContent.focus();
      } catch (err) {
        console.error(err);
        alert('저장에 실패했어요: ' + err.message);
      } finally {
        btnSubmit.disabled = false;
      }
    });

    renderCalendar();

    // 외부에서 사용할 수 있도록 전역에 노출 (디버깅 / 다른 페이지 연동용)
    window.DasomCalendar = { EventStore, renderCalendar };
  })();
  </script>
</body>
</html>
